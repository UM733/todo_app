<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスクの編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="card-title mb-0"><i class="bi bi-pencil-square"></i> タスクの編集</h4>
            </div>
            <div class="card-body p-4">
                <form action="/edit/{{ task.id }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">タスク名</label>
                        <input type="text" id="title" name="title" class="form-control form-control-lg" value="{{ task.title }}" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="due_date" class="form-label fw-bold">期限</label>
                        <input type="date" id="due_date" name="due_date" class="form-control form-control-lg" value="{% if task.due_date %}{{ task.due_date.strftime('%Y-%m-%d') }}{% endif %}">
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">変更を更新する</button>
                        <a href="/" class="btn btn-light border btn-lg">変更せずに戻る</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
