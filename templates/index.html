<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todoアプリ</title>
</head>
<body>
    <h1>Todoリスト</h1>
    
    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="新しいタスクを入力" required>
        <input type="date" name="due_date">
        <button type="submit">追加</button>
    </form>

    <div style="margin: 15px 0;">
        <a href="/delete_completed">
            <button type="button" style="background-color: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer;">
                完了タスクを一括削除
            </button>
        </a>
    </div>

    <div style="margin-bottom: 15px;">
        <a href="/?filter=all" style="text-decoration: none;">
            <button type="button" style="padding: 5px 15px; cursor: pointer; {% if current_filter == 'all' %}background-color: #ddd; font-weight: bold;{% endif %}">
                すべて
            </button>
        </a>
        <a href="/?filter=active" style="text-decoration: none;">
            <button type="button" style="padding: 5px 15px; cursor: pointer; {% if current_filter == 'active' %}background-color: #ddd; font-weight: bold;{% endif %}">
                未完了
            </button>
        </a>
        <a href="/?filter=completed" style="text-decoration: none;">
            <button type="button" style="padding: 5px 15px; cursor: pointer; {% if current_filter == 'completed' %}background-color: #ddd; font-weight: bold;{% endif %}">
                完了済み
            </button>
        </a>
    </div>

    <ul>
        {% for task in tasks %}
            <li>
                <span {% if task.completed %}style="text-decoration: line-through; color: gray;"{% endif %}>
                    {{ task.title }}
                </span>
                
                {% if task.due_date %}
                    <span style="font-size: 0.9em; color: #555; margin-left: 10px;">
                        (期限: {{ task.due_date.strftime('%Y/%m/%d') }})
                    </span>
                {% endif %}
                
                <a href="/complete/{{ task.id }}">
                    <button type="button">
                        {% if task.completed %}未完了に戻す{% else %}完了にする{% endif %}
                    </button>
                </a>

                <a href="/edit/{{ task.id }}">
                    <button type="button">編集</button>
                </a>

                <a href="/delete/{{ task.id }}">
                    <button type="button" style="color: red;">削除</button>
                </a>
            </li>
        {% else %}
            <li>表示するタスクはありません。</li>
        {% endfor %}
    </ul>
</body>
</html>
