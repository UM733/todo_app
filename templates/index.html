<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todoアプリ</title>
</head>
<body>
    <h1>Todoリスト</h1>
    
    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="新しいタスクを入力" required>
        <button type="submit">追加</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li>
                <span {% if task.completed %}style="text-decoration: line-through; color: gray;"{% endif %}>
                    {{ task.title }}
                </span>
                
                <a href="/complete/{{ task.id }}">
                    <button type="button">
                        {% if task.completed %}未完了に戻す{% else %}完了にする{% endif %}
                    </button>
                </a>
            </li>
        {% else %}
            <li>現在タスクはありません。</li>
        {% endfor %}
    </ul>
</body>
</html>
